<!DOCTYPE html>
<html>
<head>
    <title>访问统计</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        .badge-container {
            display: inline-block;
            margin: 20px;
        }
    </style>
</head>
<body>
    <div class="badge-container">
        <img id="counter-badge" src="https://count.helpserver.dpdns.org/" alt="访问统计">
    </div>
    
    <script>
        // 每隔10秒刷新计数器
        function refreshBadge() {
            const badge = document.getElementById('counter-badge');
            badge.src = badge.src.split('?')[0] + '?t=' + Date.now();
        }
        
        // 初始加载和定时刷新
        window.onload = function() {
            refreshBadge();
            setInterval(refreshBadge, 10000);
        };
    </script>
</body>
</html>
